{{define "content"}}

<section class="page">

<p class="eyebrow" data-i18n="contact.eyebrow">Start a conversation</p>
<h1 data-i18n="contact.title">Contact Netriun</h1>
<p class="page-lead" data-i18n="contact.lead">
Tell us about your network, cloud or edge goals. We will help map the fastest path to a secure intelligent fabric.
</p>

<form class="contact-form">

<input type="text" placeholder="Your Name" data-i18n-placeholder="contact.name">

<input type="email" placeholder="Email" data-i18n-placeholder="contact.email">

<textarea placeholder="Message" data-i18n-placeholder="contact.message"></textarea>

<button type="submit" data-i18n="contact.submit">
Send Message
</button>

</form>

</section>

{{end}}
